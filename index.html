<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Tudor-Andrei Hălășag - Robotics & Industrial Engineering</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #F6F1D1;
            --bg-secondary: #EDE4C8;
            --text-primary: #22194D;
            --text-secondary: #8BA4BB;
            --accent: #8BA4BB;
            --accent-hover: #6F8FA3;
            --border: #D1D5DB;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
            --shadow-hover: 0 20px 40px rgba(0,0,0,0.15);
            --gradient: linear-gradient(135deg, #8BA4BB 0%, #A8BFD9 100%);
            
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 2rem;
            --spacing-lg: 3rem;
            --spacing-xl: 4rem;
            
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-primary: 'Tajawal', sans-serif;
            --font-code: 'Fira Code', monospace;
        }

        [data-theme="dark"] {
            --bg-primary: #0a0a1a;
            --bg-secondary: #1a1a2e;
            --text-primary: #F6F1D1;
            --text-secondary: #8BA4BB;
            --accent: #8BA4BB;
            --accent-hover: #A8BFD9;
            --border: #2a2a3e;
            --shadow: 0 10px 25px rgba(0,0,0,0.4);
            --shadow-hover: 0 20px 40px rgba(0,0,0,0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: var(--font-primary);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            overflow-x: hidden;
            transition: all var(--transition);
        }

        /* Loader */
        .loader-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        .loader-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            text-align: center;
        }

        .loader-code-text {
            font-family: var(--font-code);
            font-size: 1.2rem;
            color: var(--accent);
            margin-bottom: 2rem;
        }

        .code-line {
            display: block;
            margin: 0.5rem 0;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s ease forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Header */
        .main-header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(246, 241, 209, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            transition: all var(--transition);
        }

        [data-theme="dark"] .main-header {
            background: rgba(10, 10, 26, 0.95);
        }

        .main-header.scrolled {
            background: rgba(246, 241, 209, 0.98);
            box-shadow: var(--shadow);
        }

        [data-theme="dark"] .main-header.scrolled {
            background: rgba(10, 10, 26, 0.98);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo {
            font-family: var(--font-code);
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-link {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all var(--transition);
            position: relative;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--accent);
            background: rgba(139, 164, 187, 0.1);
        }

        .nav-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .lang-toggle,
        .theme-toggle,
        .menu-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.75rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all var(--transition);
            font-size: 1rem;
        }

        .lang-toggle:hover,
        .theme-toggle:hover {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 3px;
        }

        .menu-toggle span {
            width: 20px;
            height: 2px;
            background: var(--text-primary);
            transition: all var(--transition);
            border-radius: 2px;
        }

        /* Hero */
        .hero-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 4rem 2rem;
        }

        .hero-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .hero-content h1 {
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 900;
            margin-bottom: 1rem;
            line-height: 1.1;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 1.5rem;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .hero-description {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            line-height: 1.8;
            max-width: 600px;
        }

        .hero-buttons {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            border: 2px solid transparent;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent);
            border-color: var(--accent);
        }

        .btn-secondary:hover {
            background: var(--accent);
            color: var(--bg-primary);
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .hero-image-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 0 auto;
        }

        .profile-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid var(--accent);
            box-shadow: var(--shadow);
            transition: all var(--transition);
        }

        .profile-image:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-hover);
        }

        /* Sections */
        .section {
            padding: 6rem 2rem;
            scroll-margin-top: 100px;
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s ease;
        }

        .section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-title {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 900;
            margin-bottom: 1rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* About */
        .about-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .about-text {
            font-size: 1.15rem;
            line-height: 1.9;
            color: var(--text-secondary);
        }

        .about-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .stat-item {
            text-align: center;
            padding: 2.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            transition: all var(--transition);
        }

        .stat-item:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: var(--shadow-hover);
        }

        .stat-number {
            font-family: var(--font-code);
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        /* Experience & Education */
        .timeline {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            padding: 2rem 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--gradient);
            transform: translateX(-50%);
        }

        .timeline-item {
            display: flex;
            margin-bottom: 4rem;
            opacity: 0;
            transform: translateX(-50px);
            transition: all 0.8s ease;
        }

        .timeline-item:nth-child(even) {
            flex-direction: row-reverse;
            transform: translateX(50px);
        }

        .timeline-item.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .timeline-content {
            flex: 1;
            padding: 2.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            position: relative;
            margin: 0 2rem;
            transition: all var(--transition);
        }

        .timeline-content:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: var(--shadow-hover);
        }

        .timeline-date {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .timeline-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .timeline-description {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .timeline-bullets {
            list-style: none;
            margin: 1.5rem 0;
        }

        .timeline-bullets li {
            padding-left: 1.5rem;
            margin-bottom: 1rem;
            position: relative;
            color: var(--text-secondary);
        }

        .timeline-bullets li::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* Projects */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 2.5rem;
            margin-top: 3rem;
        }

        .project-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            height: 100%;
            transition: all var(--transition);
            cursor: pointer;
        }

        .project-card:hover {
            transform: translateY(-12px);
            border-color: var(--accent);
            box-shadow: var(--shadow-hover);
        }

        .project-tech {
            display: inline-block;
            background: var(--accent);
            color: var(--bg-primary);
            padding: 0.5rem 1rem;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .project-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .project-description {
            color: var(--text-secondary);
            line-height: 1.7;
        }

        /* Skills */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2.5rem;
            margin-top: 3rem;
        }

        .skill-group {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem;
        }

        .skill-group h3 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 2rem;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .skill-tag {
            background: transparent;
            color: var(--text-secondary);
            padding: 0.75rem 1.25rem;
            border: 1px solid var(--border);
            border-radius: 25px;
            font-size: 0.9rem;
            transition: all var(--transition);
        }

        .skill-tag:hover {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        /* Contact */
        .contact-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: all var(--transition);
        }

        .contact-item:hover {
            border-color: var(--accent);
            transform: translateX(10px);
            box-shadow: var(--shadow);
        }

        .contact-icon {
            width: 60px;
            height: 60px;
            background: var(--gradient);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-primary);
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .contact-details h4 {
            font-size: 1rem;
            color: var(--text-secondary);
            margin
